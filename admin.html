<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服工作台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 整个页面的背景，作为窗口后面的底色 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="%23e0e0e0"/></svg>');
            background-color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 仿微信的主体窗口，固定尺寸并居中 */
        .chat-container {
            display: flex;
            width: 1000px;
            height: 700px;
            max-width: 95vw;
            max-height: 95vh;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 280px;
            background-color: #e6e6e6;
            border-right: 1px solid #d6d6d6;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px 15px;
            background-color: #e6e6e6;
            display: flex;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .user-item:hover {
            background-color: #d9d9d9;
        }

        .user-item.active {
            background-color: #c6c6c6;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background-color: #1aad19;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .user-name span:first-child {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-last-msg {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background-color: #f43530;
            color: white;
            border-radius: 10px;
            padding: 0 5px;
            font-size: 12px;
            min-width: 18px;
            text-align: center;
            line-height: 18px;
            height: 18px;
        }

        /* 右侧聊天区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #f5f5f5;
            position: relative;
        }

        .header {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e7e7e7;
            background-color: #f5f5f5;
            font-size: 18px;
            color: #333;
        }

        .clear-btn {
            padding: 5px 12px;
            background-color: transparent;
            border: 1px solid #dcdcdc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }

        .clear-btn:hover {
            background-color: #e5e5e5;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }

        .message.received {
            flex-direction: row;
        }

        .message.sent {
            flex-direction: row-reverse;
        }

        /* 聊天气泡旁的头像 */
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .message.received .msg-avatar {
            background-color: #ccc;
            margin-right: 15px;
        }

        .message.sent .msg-avatar {
            background-color: #1aad19;
            margin-left: 15px;
        }

        .message-content {
            max-width: 65%;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            word-break: break-all;
        }

        /* 收到的消息气泡 */
        .message.received .message-content {
            background-color: #fff;
            color: #333;
            border: 1px solid #ededed;
        }

        .message.received .message-content::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 12px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-right: 6px solid #ededed;
        }

        .message.received .message-content::after {
            content: '';
            position: absolute;
            left: -4px;
            top: 12px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-right: 6px solid #fff;
        }

        /* 发送的消息气泡 (微信绿) */
        .message.sent .message-content {
            background-color: #9eea6a;
            color: #333;
        }

        .message.sent .message-content::before {
            content: '';
            position: absolute;
            right: -6px;
            top: 12px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 6px solid #9eea6a;
        }

        /* 底部输入区 */
        .input-area {
            height: 160px;
            border-top: 1px solid #ececec;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            height: 40px;
            padding: 0 20px;
            display: flex;
            align-items: center;
        }

        .input-box {
            flex: 1;
            padding: 0 20px;
        }

        .input-box textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            background: transparent;
            color: #333;
        }

        .action-area {
            height: 50px;
            padding: 0 20px 15px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .send-btn {
            padding: 6px 24px;
            background-color: #e9e9e9;
            border: 1px solid #e1e1e1;
            border-radius: 4px;
            color: #07c160;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background-color: #d2d2d2;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #c3c3c3;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        /* 默认未选中用户时的遮罩 */
        #emptyState {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #emptyState.hidden {
            display: none;
        }
        .icon-wechat-empty {
            width: 100px;
            height: 100px;
            fill: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>客服会话列表</h2>
            </div>
            <div class="user-list" id="userList">
                </div>
        </div>

        <div class="main-content">
            <div id="emptyState">
                <svg class="icon-wechat-empty" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <path d="M699.23 358.38c0-112.98-111.95-204.58-250.04-204.58-138.1 0-250.03 91.6-250.03 204.58 0 63.85 35.8 120.67 91.35 157.9l-28.73 85.3 100.94-51.04c27.15 7.64 56.12 11.85 86.47 11.85 138.08 0 250.04-91.6 250.04-204.01zM483.74 582.5c-20.08 0-39.5-2.22-58.12-6.33l-71.18 36.03 20.25-60.14C335.54 525.68 310.4 485.87 310.4 441.2c0-79.67 78.96-144.25 176.35-144.25 97.4 0 176.36 64.58 176.36 144.25 0 79.67-78.96 144.3-179.37 141.3z"/>
                </svg>
            </div>

            <div class="header">
                <span id="currentUserName">请选择一个会话</span>
                <button class="clear-btn" onclick="clearMessages()">清空记录</button>
            </div>

            <div class="messages" id="messageArea">
                </div>

            <div class="input-area">
                <div class="toolbar">
                    </div>
                <div class="input-box">
                    <textarea id="messageInput" placeholder="输入消息... (按 Enter 发送)" onkeypress="handleKeyPress(event)"></textarea>
                </div>
                <div class="action-area">
                    <button class="send-btn" onclick="sendMessage()">发送(S)</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="notificationSound" src="/files/preview.mp3" preload="auto"></audio>

    <script>
        // WebSocket 变量
        let socket;
        // 当前选中的用户 ID
        let currentUserId = null;
        // 用户列表数据
        let users = [];
        // 消息数据 { userId: [messages] }
        let messages = {};

        // 初始化 WebSocket 连接
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//${window.location.host}/ws/admin`);

            socket.onopen = () => {
                console.log('已连接到 WebSocket 服务器');
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            socket.onclose = () => {
                console.log('与 WebSocket 服务器断开连接，3秒后重连...');
                setTimeout(initWebSocket, 3000);
            };
        }

        // 播放提示音
        function playNotificationSound() {
            const audio = document.getElementById('notificationSound');
            audio.play().catch(error => console.error("无法播放提示音", error));
        }

        // 处理接收到的消息
        function handleMessage(data) {
            if (data.type === 'init') {
                users = data.users;
                renderUserList();
            } else if (data.type === 'user_connected') {
                if (!users.find(u => u.id === data.userId)) {
                    users.push({ id: data.userId, unread: 0 });
                }
                renderUserList();
            } else if (data.type === 'user_disconnected') {
                // 可选：在界面上标记用户离线
            } else if (data.type === 'message') {
                const userId = data.userId;
                if (!messages[userId]) {
                    messages[userId] = [];
                }
                messages[userId].push(data);

                // 如果当前选中的是该用户，则更新消息列表
                if (currentUserId === userId) {
                    renderMessages();
                    scrollToBottom();
                } else {
                    // 否则增加未读数
                    const user = users.find(u => u.id === userId);
                    if (user) {
                        user.unread = (user.unread || 0) + 1;
                        renderUserList();
                    }
                }
                playNotificationSound();
            }
        }

        // 渲染用户列表
        function renderUserList() {
            const userListEl = document.getElementById('userList');
            userListEl.innerHTML = '';

            users.forEach(user => {
                const lastMsg = messages[user.id] && messages[user.id].length > 0
                    ? messages[user.id][messages[user.id].length - 1].content
                    : '新会话';

                const el = document.createElement('div');
                el.className = `user-item ${currentUserId === user.id ? 'active' : ''}`;
                el.onclick = () => selectUser(user.id);
                
                // 简单的头像占位符
                const initial = user.id.substring(0, 1).toUpperCase();

                el.innerHTML = `
                    <div class="user-avatar">${initial}</div>
                    <div class="user-info">
                        <div class="user-name">
                            <span>客户 ${user.id.substring(0, 6)}...</span>
                            ${user.unread ? `<span class="unread-badge">${user.unread}</span>` : ''}
                        </div>
                        <div class="user-last-msg">${lastMsg}</div>
                    </div>
                `;
                userListEl.appendChild(el);
            });
        }

        // 选择用户
        function selectUser(userId) {
            currentUserId = userId;
            const user = users.find(u => u.id === userId);
            if (user) {
                user.unread = 0;
            }
            
            // 隐藏空白提示页
            document.getElementById('emptyState').classList.add('hidden');
            
            document.getElementById('currentUserName').innerText = `客户 ${userId}`;
            renderUserList();
            renderMessages();
            scrollToBottom();
            document.getElementById('messageInput').focus();
        }

        // 渲染消息列表
        function renderMessages() {
            const messageArea = document.getElementById('messageArea');
            messageArea.innerHTML = '';

            if (currentUserId && messages[currentUserId]) {
                messages[currentUserId].forEach(msg => {
                    const isAdmin = msg.role === 'admin';
                    const el = document.createElement('div');
                    el.className = `message ${isAdmin ? 'sent' : 'received'}`;
                    
                    // 为聊天内容添加头像
                    const avatarStr = isAdmin ? '我' : '客';
                    el.innerHTML = `
                        <div class="msg-avatar">${avatarStr}</div>
                        <div class="message-content">${msg.content}</div>
                    `;
                    messageArea.appendChild(el);
                });
            }
        }

        // 滚动到底部
        function scrollToBottom() {
            const messageArea = document.getElementById('messageArea');
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !currentUserId) return;

            const msgData = {
                type: 'message',
                userId: currentUserId,
                content: content,
                role: 'admin'
            };

            // 发送给服务器
            socket.send(JSON.stringify(msgData));

            // 本地展示
            if (!messages[currentUserId]) {
                messages[currentUserId] = [];
            }
            messages[currentUserId].push(msgData);

            input.value = '';
            renderMessages();
            scrollToBottom();
            renderUserList(); // 更新最后一条消息的预览
        }

        // 清空当前用户的消息记录
        function clearMessages() {
            if (currentUserId && confirm('确定要清空与该客户的聊天记录吗？')) {
                messages[currentUserId] = [];
                renderMessages();
            }
        }

        // 回车发送消息
        function handleKeyPress(event) {
            // Enter 发送, Shift+Enter 换行
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 页面加载时初始化
        window.onload = initWebSocket;
    </script>
</body>
</html>
